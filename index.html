<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Aiym — PAF</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{--bg:#20272f;--gold:#e0b400;--text:#eef1f4;--muted:#b7c0ca;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;}
  .hero{position:relative;min-height:78vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(32,39,47,.35),rgba(32,39,47,.92)),url('hero.jpg') center/cover no-repeat;}
  .wrap{max-width:680px;padding:0 28px;text-align:center;}
  .eyebrow{color:var(--gold);letter-spacing:.18em;text-transform:uppercase;font-size:13px;margin-bottom:18px;}
  h1{font-size:44px;font-weight:700;margin-bottom:18px;}
  p{color:var(--muted);font-size:17px;line-height:1.6;margin-bottom:14px;}
  .badge{display:inline-block;margin-top:24px;padding:8px 18px;border:1px solid var(--gold);border-radius:30px;color:var(--gold);font-size:13px;letter-spacing:.04em;}
  .back{display:block;margin-top:36px;color:var(--muted);font-size:14px;text-decoration:none;}
  .back:hover{color:var(--gold);}
</style>
</head>
<body>
<div class="hero">
  <div class="wrap">
    <div class="eyebrow">PAF · Personal AI Family</div>
    <h1>Aiym</h1>
    <p>Спутник Aisun — новая сущность PAF, роль и образ которой пока формируются.</p>
    <p>Страница появится здесь, как только определится её место в системе.</p>
    <div class="badge">Замысел в работе</div>
    <a class="back" href="https://sun-agi.com">← sun-agi.com</a>
  </div>
</div>
</body>
</html>
